name: Release

on:
  push:
    branches:
      - "**"

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Read Gradle version
        id: version
        run: |
          VERSION=$(./gradlew properties -q | awk -F': ' '/^version:/ { print $2; exit }')
          if [ -z "$VERSION" ]; then
            echo "Unable to read Gradle project version." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist. Building plugin."
          fi

      - name: Build plugin
        if: steps.release.outputs.exists == 'false'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./gradlew buildPlugin

      - name: Create release
        if: steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" build/distributions/*.zip \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
